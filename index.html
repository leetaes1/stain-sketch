<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPE BEAST : LIVE DATA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        :root { --hb-blue: #0033FF; --hb-bg: #050505; --hb-text: #F0F0F0; --hb-grey: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--hb-bg); color: var(--hb-text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .impact { font-family: 'Impact', sans-serif; text-transform: uppercase; font-style: italic; letter-spacing: -1px; }
        #app { width: 100%; max-width: 400px; height: 100%; padding: 40px 25px; display: flex; flex-direction: column; border-left: 1px solid var(--hb-grey); border-right: 1px solid var(--hb-grey); position: relative; }
        .screen { display: none; flex-direction: column; height: 100%; animation: slideUp 0.4s ease-out forwards; }
        .screen.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .main-title { font-size: 72px; line-height: 0.85; color: var(--hb-blue); margin-bottom: 10px; }
        .star-svg { fill: var(--hb-blue); width: 80px; margin-bottom: 40px; }
        .btn-opt { background: none; border: 1px solid var(--hb-grey); color: var(--hb-text); padding: 22px; margin-bottom: 12px; text-align: left; font-size: 15px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; }
        .btn-opt:hover { background: var(--hb-blue); border-color: var(--hb-blue); }
        .stats-wrap { background: #111; padding: 25px; border: 1px solid var(--hb-grey); margin-top: auto; }
        .total-counter { font-size: 14px; margin-bottom: 20px; border-bottom: 1px solid var(--hb-grey); padding-bottom: 10px; }
        .stat-item { margin-bottom: 15px; }
        .stat-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; color: #888; }
        .stat-info .val { color: var(--hb-blue); font-weight: 900; }
        .progress-bg { height: 6px; background: #222; }
        .progress-fill { height: 100%; background: var(--hb-blue); width: 0%; transition: width 1s ease-out; }
        .btn-main { background: var(--hb-blue); color: #fff; border: none; padding: 22px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div id="intro" class="screen active">
        <h1 class="main-title impact">HYPE<br>BEAST</h1>
        <svg class="star-svg" viewBox="0 0 100 20"><polygon points="10,0 12,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 8,7"/><polygon points="40,0 42,7 50,7 44,12 46,20 40,15 34,20 36,12 30,7 38,7"/><polygon points="70,0 72,7 80,7 74,12 76,20 70,15 64,20 66,12 60,7 68,7"/></svg>
        <button class="btn-main impact" onclick="goNext()">INITIATE TEST</button>
    </div>

    <div id="question" class="screen">
        <p id="step-tag" class="impact" style="color: var(--hb-blue); margin-bottom: 10px;"></p>
        <h2 id="q-text" style="font-size: 24px; margin-bottom: 40px; font-weight: 900;"></h2>
        <div id="opt-box"></div>
    </div>

    <div id="result" class="screen">
        <p class="impact" style="color: var(--hb-blue);">IDENTIFICATION COMPLETE</p>
        <h1 id="res-type" class="impact" style="font-size: 60px; margin: 10px 0;">TYPE</h1>
        
        <div class="stats-wrap">
            <div class="total-counter impact">TOTAL FLOW : <span id="total-val" style="color:var(--hb-blue)">0</span></div>
            <div id="stat-list">
                <div class="stat-item">
                    <div class="stat-info impact"><span>FAST (MAX)</span><span class="val" id="val-A">0%</span></div>
                    <div class="progress-bg"><div class="progress-fill" id="bar-A"></div></div>
                </div>
                <div class="stat-item">
                    <div class="stat-info impact"><span>OWN (HUGO)</span><span class="val" id="val-B">0%</span></div>
                    <div class="progress-bg"><div class="progress-fill" id="bar-B"></div></div>
                </div>
                <div class="stat-item">
                    <div class="stat-info impact"><span>CREW (KRU)</span><span class="val" id="val-C">0%</span></div>
                    <div class="progress-bg"><div class="progress-fill" id="bar-C"></div></div>
                </div>
            </div>
        </div>
        <button class="btn-main impact" onclick="location.reload()">RE-BOOT SYSTEM</button>
    </div>
</div>

<script>
    // 1. 여기에 본인의 Firebase 프로젝트 설정을 입력하세요
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const db = [
        { q: "한정판 제품이 출시됐다.", a: [{t:"바로 선점한다", v:"A"}, {t:"충분히 고민한다", v:"B"}, {t:"반응을 살핀다", v:"C"}] },
        { q: "스타일 결정의 기준은?", a: [{t:"최신 트렌드", v:"A"}, {t:"나만의 아카이브", v:"B"}, {t:"크루의 정체성", v:"C"}] },
        { q: "가장 중요한 가치는?", a: [{t:"속도와 혁신", v:"A"}, {t:"취향과 고집", v:"B"}, {t:"유대와 소속", v:"C"}] }
    ];

    let step = 0;
    let picks = [];

    function goNext() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if (step < 3) {
            document.getElementById('question').classList.add('active');
            const data = db[step];
            document.getElementById('step-tag').innerText = `DATA INGESTION 0${step+1}`;
            document.getElementById('q-text').innerText = data.q;
            const box = document.getElementById('opt-box');
            box.innerHTML = '';
            data.a.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn-opt';
                b.innerHTML = `<span>${opt.t}</span><span class="impact">>></span>`;
                b.onclick = () => { picks.push(opt.v); step++; goNext(); };
                box.appendChild(b);
            });
        } else {
            submitAndShow();
        }
    }

    async function submitAndShow() {
        const final = picks.sort((a,b) => picks.filter(v=>v===a).length - picks.filter(v=>v===b).length).pop();
        document.getElementById('result').classList.add('active');
        document.getElementById('res-type').innerText = final === 'A' ? 'MAX' : final === 'B' ? 'HUGO' : 'KRU';

        // 2. Firebase 데이터 업데이트
        const statsRef = database.ref('stats');
        await statsRef.transaction((current) => {
            if (!current) current = { A: 0, B: 0, C: 0, total: 0 };
            current[final]++;
            current.total++;
            return current;
        });

        // 3. 최신 데이터 가져와서 0부터 애니메이션 실행
        statsRef.once('value', (snapshot) => {
            const data = snapshot.val();
            animateResults(data);
        });
    }

    function animateResults(data) {
        // 숫자가 0에서 실제 합산된 결과까지 올라감
        let count = 0;
        const totalVal = document.getElementById('total-val');
        const interval = setInterval(() => {
            count++;
            totalVal.innerText = count;
            if (count >= data.total) clearInterval(interval);
        }, 20);

        ['A', 'B', 'C'].forEach(t => {
            const perc = Math.round((data[t] / data.total) * 100);
            document.getElementById(`bar-${t}`).style.width = perc + '%';
            document.getElementById(`val-${t}`).innerText = perc + '%';
        });
    }
</script>
</body>
</html>
